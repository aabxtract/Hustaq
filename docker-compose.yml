version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: hustaq_db
    environment:
      POSTGRES_DB: hustaq
      POSTGRES_USER: hustaq
      POSTGRES_PASSWORD: hustaq_local
    ports:
      - '5432:5432'
    volumes:
      - hustaq_pg_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: hustaq_redis
    ports:
      - '6379:6379'

volumes:
  hustaq_pg_data:
